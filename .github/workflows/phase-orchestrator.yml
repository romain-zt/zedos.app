name: Phase Orchestrator

# Advances phase agents after merges. Opens a draft "tracking" PR (orchestrator/*.md stub);
# phase implementation must land on that PR's branch (or stacked dependents) so merges include
# source — see ORCHESTRATOR_BRANCH_RULES in .github/scripts/phase-orchestrator.ts.

on:
  pull_request:
    types: [closed]
  # Safety net: re-check every 30 min in case a trigger was missed
  # (e.g. GITHUB_TOKEN-triggered merges don't fire pull_request events)
  schedule:
    - cron: "*/30 * * * *"
  # Manual escape hatch — use when the chain is stuck and no PR is available to merge
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you manually triggering?"
        required: false
        default: "manual kickoff"
      step_id:
        description: "Specific step to execute — leave blank for coordinator mode (auto-detects all ready steps)"
        required: false
        default: ""

concurrency:
  # Workers each get a step-scoped group so they run in parallel.
  # The coordinator gets its own group to avoid queuing against workers.
  group: ${{ github.event.inputs.step_id && format('phase-orchestrator-worker-{0}-{1}', github.event.inputs.step_id, github.repository) || format('phase-orchestrator-coordinator-{0}', github.repository) }}
  cancel-in-progress: false

jobs:
  orchestrate:
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || (
        github.event_name == 'pull_request'
        && github.event.pull_request.merged == true
        && (
          github.event.pull_request.base.ref == 'main'
          || startsWith(github.event.pull_request.base.ref, 'feature/')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install --prefix .github/scripts

      # Prints dashboard + SSE URLs immediately after the cloud run starts; also appends links to the job summary.
      - name: Run phase orchestrator
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_AGENT_MODEL: ${{ vars.CURSOR_AGENT_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          MERGED_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          MERGED_HEAD_BRANCH: ${{ github.event.pull_request.head.ref || '' }}
          MERGED_PR_TITLE: ${{ github.event.pull_request.title || '' }}
          ORCHESTRATOR_ENABLED: ${{ vars.ORCHESTRATOR_ENABLED || 'true' }}
          ORCHESTRATOR_TRACKING_BASE: ${{ vars.ORCHESTRATOR_TRACKING_BASE || 'main' }}
          STEP_ID: ${{ github.event.inputs.step_id || '' }}
        run: npx tsx .github/scripts/phase-orchestrator.ts

name: Auto-rebase — pnpm-lock.yaml only

# Handles one mechanical case: a PR's pnpm-lock.yaml is out of date after
# a push to main. Regenerates and pushes. Content-file conflicts are handled
# by conflict-resolver.yml (Cursor Agent) which resolves them intelligently
# instead of blindly taking one side.

on:
  pull_request:
    types: [ready_for_review]

jobs:
  regenerate-lockfile:
    # Only run for non-draft PRs becoming ready
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Regenerate pnpm-lock.yaml if stale
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git fetch origin main

          # Only proceed if pnpm-lock.yaml would conflict or is behind main
          if git diff --name-only origin/main...HEAD | grep -q "pnpm-lock.yaml"; then
            echo "🔄 pnpm-lock.yaml is diverged — regenerating…"
            pnpm install --frozen-lockfile=false --silent 2>/dev/null || true
            if [ -n "$(git status --porcelain pnpm-lock.yaml)" ]; then
              git add pnpm-lock.yaml
              git commit -m "chore: regenerate pnpm-lock.yaml [skip ci]"
              git push origin "$PR_BRANCH"
              echo "✅ pnpm-lock.yaml regenerated and pushed."
            else
              echo "✅ pnpm-lock.yaml already up to date."
            fi
          else
            echo "✅ pnpm-lock.yaml is not diverged — nothing to do."
          fi

version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: zedos_test
      POSTGRES_PASSWORD: zedos_test
      POSTGRES_DB: zedos_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zedos_test']
      interval: 5s
      timeout: 5s
      retries: 5

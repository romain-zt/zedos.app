name: CI

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CI: true
      ESLINT_USE_FLAT_CONFIG: 'false'
      # Matches apps/web/docker-compose.yml (postgres service, host port 5433)
      DATABASE_URL: postgresql://zedos_test:zedos_test@127.0.0.1:5433/zedos_test
      TEST_DATABASE_URL: postgresql://zedos_test:zedos_test@127.0.0.1:5433/zedos_test
      BETTER_AUTH_SECRET: ci-better-auth-secret-min-32-chars-long
      NEXTAUTH_SECRET: ci-nextauth-secret-min-32-chars-long
      BETTER_AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXTAUTH_URL: http://127.0.0.1:3000
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      ABACUSAI_API_KEY: ci-abacus-placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Postgres (apps/web/docker-compose.yml)
        run: docker compose -f apps/web/docker-compose.yml up -d postgres --wait

      - name: Apply Drizzle migrations
        run: cd packages/db && pnpm db:migrate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

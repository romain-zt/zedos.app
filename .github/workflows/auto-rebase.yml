name: Auto-rebase on Conflict

# After every push to main, find open PRs that now have merge conflicts
# and automatically rebase them — keeping the overnight chain unblocked.

on:
  push:
    branches: [main]

jobs:
  auto-rebase:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Rebase all conflicted open PRs
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Find all open PRs (non-draft too) that target main and have conflicts
          CONFLICTED=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --base main \
            --json number,headRefName,mergeable \
            --jq '.[] | select(.mergeable == "CONFLICTING") | "\(.number) \(.headRefName)"')

          if [ -z "$CONFLICTED" ]; then
            echo "✅ No conflicted PRs found."
            exit 0
          fi

          echo "Conflicted PRs to rebase:"
          echo "$CONFLICTED"

          while IFS= read -r line; do
            PR_NUM=$(echo "$line" | awk '{print $1}')
            PR_BRANCH=$(echo "$line" | awk '{print $2}')
            echo ""
            echo "━━━ PR #$PR_NUM ($PR_BRANCH) ━━━"

            git fetch origin "$PR_BRANCH"
            git checkout "$PR_BRANCH"
            git pull origin "$PR_BRANCH" --ff-only 2>/dev/null || true

            if ! git rebase origin/main -X ours; then
              # pnpm-lock.yaml: always regenerate
              if git diff --name-only --diff-filter=U | grep -q "pnpm-lock.yaml"; then
                rm -f pnpm-lock.yaml
                git checkout --ours . 2>/dev/null || true
                git add -A
                GIT_EDITOR=true git rebase --continue || true
              fi

              # Remaining conflicts: branch wins
              while git diff --name-only --diff-filter=U | grep -q .; do
                git diff --name-only --diff-filter=U | xargs git checkout --ours
                git add -A
                GIT_EDITOR=true git rebase --continue || break
              done
            fi

            # Regenerate lock file
            pnpm install --frozen-lockfile=false --silent 2>/dev/null || true
            if [ -n "$(git diff --name-only pnpm-lock.yaml)" ]; then
              git add pnpm-lock.yaml
              git commit -m "chore: regenerate pnpm-lock.yaml after rebase [skip ci]" || true
            fi

            git push --force-with-lease origin "$PR_BRANCH"
            echo "✅ PR #$PR_NUM rebased and pushed"

            git checkout main
          done <<< "$CONFLICTED"

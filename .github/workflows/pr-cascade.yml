name: PR Cascade

# When a PR merges into main:
# 1. Find open draft PRs whose base = the merged head branch (stacked PR pattern)
# 2. Rebase them onto main
# 3. Merge them directly — keeping the chain moving overnight without human intervention

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  cascade:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      MERGED_HEAD: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Find, rebase, and merge stacked PRs
        run: |
          echo "Merged branch: $MERGED_HEAD"

          # Find open draft PRs whose base matches the merged head branch
          DRAFT_PRS=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --draft \
            --base "$MERGED_HEAD" \
            --json number,title \
            --jq '.[] | "\(.number) \(.title)"')

          if [ -z "$DRAFT_PRS" ]; then
            echo "No stacked draft PRs found with base '$MERGED_HEAD'."
            exit 0
          fi

          echo "Stacked PRs to advance:"
          echo "$DRAFT_PRS"

          while IFS= read -r line; do
            PR_NUM=$(echo "$line" | awk '{print $1}')
            echo ""
            echo "→ PR #$PR_NUM: rebasing base onto main"
            gh pr edit "$PR_NUM" --repo "$REPO" --base main

            echo "→ PR #$PR_NUM: merging"
            gh pr merge "$PR_NUM" --repo "$REPO" --merge --delete-branch \
              || echo "  ⚠️ Could not merge PR #$PR_NUM — may need manual review"
          done <<< "$DRAFT_PRS"

name: E2E

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zedos_test
          POSTGRES_PASSWORD: zedos_test
          POSTGRES_DB: zedos_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U zedos_test -d zedos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://zedos_test:zedos_test@localhost:5433/zedos_test
      TEST_DATABASE_URL: postgresql://zedos_test:zedos_test@localhost:5433/zedos_test
      BETTER_AUTH_SECRET: e2e-ci-better-auth-secret-min-32-chars
      NEXTAUTH_SECRET: e2e-ci-nextauth-secret-min-32-chars
      BETTER_AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXTAUTH_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      E2E_MODE: 'true'
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migrate database
        run: pnpm --filter @repo/db db:migrate

      - name: Seed E2E fixtures
        run: pnpm --filter @repo/web e2e:seed

      - name: Build web app
        run: pnpm --filter @repo/web build

      - name: Install Playwright browsers
        run: pnpm --filter @repo/web exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm --filter @repo/web test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

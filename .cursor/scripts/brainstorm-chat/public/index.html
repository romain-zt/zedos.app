<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brainstorm</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">

      <!-- ── Header ── -->
      <header class="header">
        <div class="header-brand">
          <h1>Brainstorm</h1>
          <div class="goal-bar" id="goal-bar" hidden>
            <span class="goal-label">Goal</span>
            <span class="goal-text" id="goal-text"></span>
          </div>
        </div>
        <div class="header-actions">
          <div class="status" id="status">Connecting…</div>
          <button type="button" class="ghost" id="pause">Pause</button>
          <button type="button" class="ghost danger" id="force-stop">Stop</button>
        </div>
      </header>

      <!-- ── Workspace ── -->
      <div class="workspace">

        <!-- Left sidebar: agents + stream panel -->
        <aside class="sidebar">
          <div class="sidebar-label">Agents</div>
          <div class="agent-list" id="agent-list" aria-label="Agent list"></div>

          <!-- Assets accordion -->
          <details class="assets-accordion" id="assets-accordion" hidden>
            <summary class="assets-summary">
              <span>Assets</span>
              <span class="badge" id="assets-count" hidden>0</span>
            </summary>
            <ul class="assets-list" id="assets-list"></ul>
          </details>

          <!-- Stream panel: appears when an agent is selected -->
          <div class="stream-panel" id="stream-panel" hidden>
            <div class="stream-hd">
              <span class="live-dot" id="stream-pulse" aria-hidden="true" hidden></span>
              <span class="stream-name" id="stream-name"></span>
              <span class="stream-phase" id="stream-phase"></span>
              <button class="stream-close" id="stream-close" aria-label="Close stream">✕</button>
            </div>
            <div class="stream-body" id="stream-body">
              <p class="stream-empty">Select an agent to see its live stream.</p>
            </div>
          </div>
        </aside>

        <!-- Right: chat + composer -->
        <div class="main-area">
          <div class="chat" id="chat" aria-live="polite" aria-label="Chat"></div>

          <form class="composer" id="form" autocomplete="off">
            <input
              id="topic"
              name="topic"
              type="text"
              placeholder="Goal / topic (optional)"
            />
            <div class="composer-row">
              <textarea
                id="input"
                name="message"
                rows="2"
                placeholder="Your message… (Enter to send)"
                required
              ></textarea>
              <button type="submit" id="send">Send</button>
            </div>
            <p class="hint" id="hint">Failures auto-retry with a fresh agent.</p>
          </form>
        </div>

      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>

name: PR Ready — Auto-merge Orchestrator Tracking PRs

# Fires when any PR is marked ready for review.
# If the PR title starts with "chore(orchestrator): [tracking]", it is an
# auto-generated phase tracking PR. Merge it immediately so the
# phase-orchestrator.yml workflow fires and advances the chain.

# Any base branch (main, feature/*, etc.) — tracking PRs may target an integration branch
# when ORCHESTRATOR_TRACKING_BASE is set — see .github/CURSOR_SETUP.md
on:
  pull_request:
    types: [ready_for_review]

jobs:
  auto-merge-tracking:
    if: "startsWith(github.event.pull_request.title, 'chore(orchestrator): [tracking]')"
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - name: Merge tracking PR
        run: |
          echo "✅ Tracking PR #$PR_NUMBER is ready: $PR_TITLE"
          echo "Merging…"

          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --merge \
            --subject "chore(orchestrator): complete phase tracking PR #$PR_NUMBER" \
            --delete-branch

      - name: Dispatch Phase Orchestrator
        run: |
          echo "🔁 Dispatching phase-orchestrator to advance the chain…"
          gh workflow run phase-orchestrator.yml \
            --repo "$REPO" \
            -f reason="tracking PR #$PR_NUMBER merged — auto-dispatch"

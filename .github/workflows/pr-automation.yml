name: PR Automation
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

jobs:
  required-checks:
    name: gate-required-checks
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read
      checks: read
    steps:
      - uses: actions/checkout@v4

      - name: Wait for CI quality and E2E playwright
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          REQUIRED_CHECKS: quality,playwright
        run: bash .github/scripts/wait-for-required-pr-checks.sh

  cursor-review-and-merge:
    needs: required-checks
    runs-on: ubuntu-latest
    if: >-
      needs.required-checks.result == 'success'
      && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write
      checks: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install --prefix .github/scripts

      - name: Run Cursor PR automation
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_AGENT_MODEL: ${{ vars.CURSOR_AGENT_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: npx tsx .github/scripts/pr-automation.ts
